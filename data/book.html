<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <p><strong>Information: </strong></p>
    <p>
      ID: ${book.idenNum}
    </p>
    <p>Title: ${book.name}</p>
    <p>Author: ${book.author}</p>
    <#if book.isAvailable()>
        Available
    <#else>
        Issued to ${book.employee}
    </#if>
    <p>Description: ${book.description}</p>
    <img src="${book.imgUrl}", width="200">
</body>
</html>
